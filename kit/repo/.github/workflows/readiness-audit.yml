name: Agent readiness audit

on:
  issues:
    types: [opened, edited, labeled, unlabeled, reopened]

permissions:
  contents: read
  issues: write

jobs:
  audit:
    if: contains(github.event.issue.labels.*.name, 'agent-ready')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Audit real Issue Form values
        uses: actions/github-script@v8
        with:
          script: |
            const { auditIssueBody } = require('./.github/scripts/readiness-audit.cjs');
            const issue = context.payload.issue;
            const labels = issue.labels.map((label) => typeof label === 'string' ? label : label.name);
            let hasSubIssues = false;
            let leafStateKnown = true;

            try {
              const data = await github.graphql(`
                query($owner: String!, $repo: String!, $number: Int!) {
                  repository(owner: $owner, name: $repo) {
                    issue(number: $number) { subIssues(first: 1) { totalCount } }
                  }
                }
              `, { owner: context.repo.owner, repo: context.repo.repo, number: issue.number });
              hasSubIssues = data.repository.issue.subIssues.totalCount > 0;
            } catch (error) {
              leafStateKnown = false;
              core.warning(`Native sub-issue check unavailable; readiness fails closed: ${error.message}`);
            }

            const result = auditIssueBody({ body: issue.body || '', labels, hasSubIssues, leafStateKnown });
            const marker = '<!-- codex-readiness-audit:v2 -->';
            const body = [
              marker,
              '## Agent readiness audit',
              '',
              `Status: ${result.ready ? 'PASS' : 'FAIL'}`,
              '',
              ...(result.ready
                ? ['All required Issue Form values are substantive, enumerated values are valid, acceptance contains three to five checks, and native leaf state is verified. Project Status and native dependencies remain Orchestrator checks.']
                : ['The `agent-ready` label was removed.', '', 'Reasons:', ...result.reasons.map((reason) => `- ${reason}`)]),
            ].join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body,
              });
            }

            if (!result.ready) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  name: 'agent-ready',
                });
              } catch (error) {
                if (error.status !== 404) throw error;
              }
              core.setFailed(result.reasons.join(' '));
            }
