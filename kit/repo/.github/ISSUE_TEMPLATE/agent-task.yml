name: Agent Work Item
description: Define an Epic, Capability, Task, Bug, Docs, Automation, or Refactor contract.
title: "[Work]: "
labels: [workflow]
body:
  - type: markdown
    attributes:
      value: |
        Fill real values. Only an unblocked XS–M leaf Issue may receive `agent-ready`.
  - type: dropdown
    id: work_type
    attributes:
      label: Work Type
      options: [Epic, Capability, Task, Bug, Docs, Automation, Refactor]
    validations: { required: true }
  - type: input
    id: plan_item_id
    attributes:
      label: Plan Item ID
      description: Stable Planner ID retained when the GitHub Issue number is assigned.
      placeholder: "mvp.core-journey.export-report"
    validations: { required: true }
  - type: dropdown
    id: phase
    attributes:
      label: Phase
      options: [Discovery, Planning, Design, Foundation, MVP, Stabilization, Production, Growth]
    validations: { required: true }
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options: [P0, P1, P2, P3]
    validations: { required: true }
  - type: dropdown
    id: size
    attributes:
      label: Size
      description: L and XL must be decomposed before agent-ready.
      options: [XS, S, M, L, XL]
    validations: { required: true }
  - type: dropdown
    id: risk
    attributes:
      label: Risk
      options: [Low, Medium, High]
    validations: { required: true }
  - type: dropdown
    id: qa_required
    attributes:
      label: QA Required
      options: ["Yes", "No"]
    validations: { required: true }
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: Observable user or repository outcome.
    validations: { required: true }
  - type: textarea
    id: merge_outcome
    attributes:
      label: Merge Outcome
      description: The independently acceptable result delivered by one branch and one PR.
    validations: { required: true }
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Three to five observable pass/fail criteria.
      placeholder: |
        - Given ..., when ..., then ...
    validations: { required: true }
  - type: textarea
    id: blockers
    attributes:
      label: Dependency / Blocker State
      description: Use native dependencies for enforcement; explain them here.
      placeholder: "None, or linked native dependency Issues."
    validations: { required: true }
  - type: textarea
    id: validation
    attributes:
      label: Validation Expectations
      description: Exact targeted, full, browser, or manual checks.
    validations: { required: true }
  - type: textarea
    id: integration_validation
    attributes:
      label: Integration Validation
      description: Exact checks proving compatibility with adjacent modules and integration order.
    validations: { required: true }
  - type: input
    id: integration_order
    attributes:
      label: Integration Order
      description: Positive sequence number within the approved wave.
      placeholder: "1"
    validations: { required: true }
  - type: textarea
    id: primary_signal
    attributes:
      label: Primary Signal
      description: Main user-visible or runtime proof of completion.
    validations: { required: true }
  - type: textarea
    id: secondary_signals
    attributes:
      label: Secondary Signals
      description: Tests, typecheck, lint, build, logs, screenshots, and CI.
    validations: { required: true }
  - type: textarea
    id: security
    attributes:
      label: Security Impact
      placeholder: "None, or auth/data/security surface and required review."
    validations: { required: true }
  - type: textarea
    id: design
    attributes:
      label: UI / Design Impact
      placeholder: "None, or flows, states, responsive, accessibility, content, and evidence."
    validations: { required: true }
  - type: textarea
    id: tdd
    attributes:
      label: TDD / Exemption
      placeholder: "TDD required, or docs/config exemption with reason."
    validations: { required: true }
  - type: textarea
    id: owner_layer
    attributes:
      label: Owner Layer
      description: The single layer that owns the behavior and the first place to fix it.
    validations: { required: true }
  - type: textarea
    id: conflict_keys
    attributes:
      label: Conflict Keys
      description: Comma-separated unstable surfaces used to serialize overlapping Workers.
      placeholder: "frontend-router, request-contract"
    validations: { required: true }
  - type: textarea
    id: touch_points
    attributes:
      label: Expected Touch Points
      description: Expected files, components, contracts, migrations, tests, and docs.
    validations: { required: true }
  - type: textarea
    id: reviewers
    attributes:
      label: Conditional Reviewers
      description: Always reviewer, QA, and admission-reviewer; add design/security when applicable.
    validations: { required: true }
  - type: textarea
    id: out_of_scope
    attributes:
      label: Out of Scope
      description: Explicit nearby work that must not enter this branch.
    validations: { required: true }
  - type: textarea
    id: human_gates
    attributes:
      label: Human Gates
      description: Phase, high-risk, migration, dependency, merge, or other required decisions.
      placeholder: "Human merge approval only, or list additional gates."
    validations: { required: true }
